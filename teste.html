<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Helpdesk Requests</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #error_box {
            color: #721c24;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            margin-bottom: 15px;
            display: none;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

<h2>Helpdesk Requests</h2>

<!-- 🔴 Error box -->
<div id="error_box"></div>

<!-- 📊 Data output -->
<div id="records_show">Loading...</div>

<script>
function fetchHelpdeskRequests() {
    var xhr = new XMLHttpRequest();
    var url = "https://supabase1.myserver.pt/rest/v1/helpdeskrequests";

    xhr.open("GET", url, true);

    var apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjEyMzQ1Njc4LCJleHAiOjI2MTIzNDU2Nzh9.szPPmYS9Pa9WENwHSgsrd7i_YaYLmmORiVqA9jguyGc";

    xhr.setRequestHeader("apikey", apiKey);
    //xhr.setRequestHeader("Authorization", "Bearer " + apiKey);
    xhr.setRequestHeader("Authorization", apiKey);
    xhr.setRequestHeader("Content-Type", "application/json");

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
            var container = document.getElementById("records_show");
            var errorBox = document.getElementById("error_box");

            if (xhr.status === 200) {
                errorBox.style.display = "none";
                errorBox.innerHTML = "";

                var data = JSON.parse(xhr.responseText);

                if (data.length === 0) {
                    container.innerHTML = "No records found.";
                    return;
                }

                var output = "<table><tr>";

                // headers
                for (var key in data[0]) {
                    output += "<th>" + key + "</th>";
                }
                output += "</tr>";

                // rows
                for (var i = 0; i < data.length; i++) {
                    output += "<tr>";
                    for (var key in data[i]) {
                        output += "<td>" + data[i][key] + "</td>";
                    }
                    output += "</tr>";
                }

                output += "</table>";

                container.innerHTML = output;

            } else {
                errorBox.style.display = "block";
                errorBox.innerHTML = "<b>Error:</b> " + xhr.status + "<br>" + xhr.responseText;

                container.innerHTML = "";
            }
        }
    };

    xhr.send();
}

fetchHelpdeskRequests();
</script>

</body>
</html>
