<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal de Recursos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 40%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="bg-white/95 backdrop-blur-sm p-10 rounded-2xl border border-slate-200 shadow-2xl text-center max-w-md w-full">
        <img src="logo.png" alt="Logotipo" class="h-12 w-auto mx-auto mb-6 drop-shadow-sm">
        
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Portal de Recursos</h2>
        <p class="text-sm text-slate-500 mb-8">Por favor, inicie sessão para aceder ao Dashboard.</p>

        <form id="login-form" class="space-y-4 text-left">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="email" required placeholder="o-seu-email@empresa.com"
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition-all bg-slate-50 focus:bg-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Palavra-passe</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition-all bg-slate-50 focus:bg-white">
            </div>

            <p id="error-msg" class="text-red-500 text-sm hidden text-center font-medium"></p>

            <button type="submit" id="submit-btn"
                class="w-full py-3 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold shadow-md hover:shadow-lg transition-all duration-300">
                Aceder ao Dashboard
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
