<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Recursos</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg-gradient: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 40%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body.staticrypt-body { 
            margin: 0; 
            padding: 0; 
            background-image: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: #1e293b; 
        }

        .staticrypt-content {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 3.5rem 2.5rem; 
            border-radius: 1.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            backdrop-filter: blur(10px);
        }

        .login-card img.logo { 
            display: block; 
            margin: 0 auto 2rem auto; 
            max-height: 50px; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .instructions h2 { 
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .instructions p { 
            margin-bottom: 2.5rem; 
            font-size: 0.95rem; 
            color: #64748b; 
            line-height: 1.5; 
        }

        .staticrypt-password-container {
            position: relative;
            margin-bottom: 1.2rem;
            width: 100%;
        }

        #staticrypt-password { 
            width: 100%; 
            padding: 0.9rem 2.5rem 0.9rem 1.2rem; 
            border: 2px solid #f1f5f9; 
            border-radius: 0.75rem; 
            font-size: 1rem; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        #staticrypt-password:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 20px;
            opacity: 0.4;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            transition: opacity 0.3s;
        }

        .staticrypt-toggle-password-visibility:hover {
            opacity: 0.8;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
            cursor: pointer;
        }

        .staticrypt-remember input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .staticrypt-decrypt-button { 
            width: 100%; 
            padding: 1rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 0.75rem; 
            font-size: 1rem; 
            font-weight: 600; 
            letter-spacing: 0.025em;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .staticrypt-decrypt-button:hover { 
            background: #2563eb; 
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .hidden { display: none !important; }

        .staticrypt-spinner-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100%;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2.5rem;
            height: 2.5rem;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-right-color: var(--primary);
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
