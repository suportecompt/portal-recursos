<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Formulários</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // Supabase configuration and client initialization
        const SUPABASE_URL = "https://ibpgiqwcuhypwwapafnc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_nyD73iRFwU9OGos23psE7g_ys0oNWSm";
        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-[#f8fafc] text-slate-900 antialiased">

    <div class="max-w-7xl mx-auto px-6 py-12">
        
        <header class="flex flex-col md:flex-row items-start md:items-center justify-between gap-6 mb-12">
            
            <div class="flex items-center gap-3 sm:gap-4">
                <img src="logo.png" alt="Logotipo" class="h-8 md:h-10 w-auto shrink-0">
                <div class="h-6 md:h-8 w-[1px] bg-slate-200 shrink-0"></div>
                <h1 class="text-lg md:text-xl font-bold tracking-tight text-slate-800 line-clamp-1">Portal de Recursos</h1>
            </div>

            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                
                <div class="relative flex-grow sm:flex-grow-0">
                    <select id="sort-options" class="w-full appearance-none bg-white border border-slate-200 text-slate-700 py-2 pl-4 pr-10 rounded-lg text-sm font-medium focus:outline-none focus:border-blue-500 cursor-pointer shadow-sm">
                        <option value="all">Todos os Clientes</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>

                <div class="flex bg-slate-200 p-1 rounded-lg shrink-0 ml-auto sm:ml-0">
                    <button id="view-grid" class="p-2 rounded-md bg-white shadow-sm text-blue-600 transition-all">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    </button>
                    <button id="view-list" class="p-2 rounded-md text-slate-500 hover:text-slate-700 transition-all">
                        <i data-lucide="list" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <main id="form-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </main>
        
    </div>
    <!-- DATA NOW IS TAKEN FROM SUPABASE DB
        <script src="data.js"></script>
    -->
    <script src="script.js"></script>
</body>
</html>
